name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # Adjust based on your project
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json # ✅ Cache dependencies from frontend/

            - name: Install dependencies
              run: |
                  cd frontend  # ✅ Move into frontend before installing
                  npm install

            - name: Run tests
              run: |
                  cd frontend  # ✅ Move into frontend before running tests
                  npx vitest --run
