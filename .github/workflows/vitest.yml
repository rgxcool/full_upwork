name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # ✅ No caching in setup-node to avoid lock file issue

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: frontend/node_modules
                  key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
                  restore-keys: |
                      npm-${{ runner.os }}-

            - name: Install dependencies
              working-directory: frontend # ✅ Ensures npm runs inside frontend/
              run: npm install

            - name: Run tests
              working-directory: frontend # ✅ Ensures Vitest runs inside frontend/
              run: npx vitest --run
