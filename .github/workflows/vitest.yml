name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    tests:
        runs-on: ubuntu-latest
        env:
            COMPOSE_PROJECT_NAME: mindful-new

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Start MongoDB
              run: docker compose -f docker-compose.yml -p mindful-new up -d mongo

            - name: Run backend tests
              run: make citest

            - name: Tear down MongoDB
              if: always()
              run: docker compose -f docker-compose.yml -p mindful-new down
