name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # Use your project's Node.js version
                  cache: npm

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npx vitest --run
