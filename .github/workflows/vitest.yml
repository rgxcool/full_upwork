name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    tests:
        runs-on: ubuntu-latest
        env:
            COMPOSE_PROJECT_NAME: mindful-new

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25

            - name: Install backend dependencies
              working-directory: backend
              run: npm ci

            - name: Cache backend npm dependencies
              uses: actions/cache@v4
              with:
                  path: backend/node_modules
                  key: npm${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
                  restore-keys: |
                      npm-${{ runner.os }}-

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Cache frontend npm dependencies
              uses: actions/cache@v4
              with:
                  path: frontend/node_modules
                  key: npm${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
                  restore-keys: |
                      npm-${{ runner.os }}-

            - name: Start MongoDB
              run: docker compose -f docker-compose.yml -p mindful-new up -d mongo

            - name: Backend Tests
              run: make test-backend

            - name: Frontend Tests
              run: make test-frontend

            - name: Tear down MongoDB
              if: always()
              run: docker compose -f docker-compose.yml -p mindful-new down
