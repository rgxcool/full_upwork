name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json # ✅ Correct dependency path

            - name: Install dependencies
              working-directory: frontend # ✅ Ensures npm runs inside frontend/
              run: npm install

            - name: Run tests
              working-directory: frontend # ✅ Ensures Vitest runs inside frontend/
              run: npx vitest --run
