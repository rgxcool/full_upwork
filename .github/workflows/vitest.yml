name: Run Vitest Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend # ✅ Set working directory globally

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18 # Adjust based on your project
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json # ✅ Ensure caching works inside frontend

            - name: Install dependencies
              run: npm install # ✅ No need to cd into frontend since it's globally set

            - name: Run tests
              run: npx vitest --run
